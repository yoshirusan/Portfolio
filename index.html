    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 4rem;
            position: sticky;
            top: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #fff;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease, opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.7;
        }

        /* Social Icon */
        .social-icon {
            width: 20px;
            height: 20px;
            fill: #fff;
            transition: opacity 0.3s ease;
        }
        
        .social-icon:hover {
            opacity: 0.7;
        }

        /* Edge-to-Edge Image Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3 / 4; 
            background-color: #111; 
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-item:hover img {
            transform: scale(1.03);
        }
        /* Wide Feature Image */
        .wide-feature {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background-color: #111;
        }

        .wide-feature img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* This adds the smooth, slow transition */
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* This tells the image to zoom in slightly when hovered */
        .wide-feature:hover img {
            transform: scale(1.04);
        }

        .wide-feature img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Contact Section */
        .contact-section {
            padding: 8rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .contact-header p {
            font-size: 0.85rem;
            color: #aaa;
        }

        .contact-form {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: flex;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .form-group input, 
        .form-group textarea {
            background: transparent;
            border: 1px solid #333; /* Dark grey border to match theme */
            color: #fff;
            padding: 0.8rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #fff;
        }

        .submit-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            align-self: center;
            margin-top: 1rem;
            transition: opacity 0.3s ease;
        }

        .submit-btn:hover {
            opacity: 0.8;
        }

        .email-text {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0px; /* Resets the spacing so it reads naturally */}

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .gallery { grid-template-columns: repeat(2, 1fr); }
            header { padding: 2rem; }
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            .gallery { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 1.5rem; }
        }
    </style>
